steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/arxiv-digest:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/arxiv-digest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'arxiv-digest'
      - '--image=gcr.io/$PROJECT_ID/arxiv-digest:latest'
      - '--region=$_REGION'
      - '--set-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest,TELEGRAM_BOT_TOKEN=bot_key:latest,TELEGRAM_CHAT_ID=telegram-chat-id:latest'
      - '--set-env-vars=ARXIV_MAX_RESULTS=300,TOP_N_PAPERS=5,CLAUDE_MODEL_RANKING=claude-sonnet-4-6,CLAUDE_MODEL_SUMMARY=claude-haiku-4-5-20251001'
      - '--task-timeout=600'
      - '--memory=512Mi'
      - '--max-retries=0'
      - '--project=$PROJECT_ID'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: europe-west2

images:
  - 'gcr.io/$PROJECT_ID/arxiv-digest'