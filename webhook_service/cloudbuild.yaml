steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/arxiv-service:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/arxiv-service'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'arxiv-service'
      - '--image=gcr.io/$PROJECT_ID/arxiv-service:latest'
      - '--region=$_REGION'
      - '--project=$PROJECT_ID'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: europe-west2

images:
  - 'gcr.io/$PROJECT_ID/arxiv-service'